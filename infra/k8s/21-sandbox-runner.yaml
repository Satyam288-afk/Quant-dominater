# Sandbox runner: builds contestant images and launches sandboxes. The shipped
# runner runs in "docker" mode (the proven isolation boundary). The cloud-native
# design — where the sandbox boundary is a Pod in iicpc-sandbox (see
# 40-sandbox-pod-template) created via the scoped sandbox-orchestrator
# ServiceAccount (never Docker-in-Docker), with builds through a rootless
# BuildKit (kaniko/buildkitd) — is a documented next step; see infra/k8s/README.md.
apiVersion: v1
kind: Service
metadata:
  name: sandbox-runner
  namespace: iicpc
  labels: { app: sandbox-runner }
spec:
  selector: { app: sandbox-runner }
  ports:
    - { name: http, port: 9200, targetPort: 9200 }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sandbox-runner
  namespace: iicpc
spec:
  replicas: 1
  selector: { matchLabels: { app: sandbox-runner } }
  template:
    metadata:
      labels: { app: sandbox-runner }
    spec:
      serviceAccountName: sandbox-orchestrator
      containers:
        - name: sandbox-runner
          image: ghcr.io/iicpc/sandbox-runner:latest
          env:
            - { name: SANDBOX_RUNNER_ADDR, value: ":9200" }
            # The shipped runner supports "local" and "docker"; "kubernetes" is a
            # documented next step (the orchestrator would apply the
            # 40-sandbox-pod-template per run via the scoped SA). See infra/k8s/README.md.
            - { name: SANDBOX_RUNNER_MODE, value: "docker" }
            - { name: SANDBOX_NAMESPACE, value: "iicpc-sandbox" }
            - { name: REPO_ROOT, value: "/data" }
          ports:
            - { name: http, containerPort: 9200 }
          resources:
            requests: { cpu: "200m", memory: "256Mi" }
            limits: { cpu: "1", memory: "1Gi" }
          readinessProbe:
            httpGet: { path: /health, port: 9200 }
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /health, port: 9200 }
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          volumeMounts:
            - { name: artifacts, mountPath: /data }
      volumes:
        - name: artifacts
          emptyDir: {}
