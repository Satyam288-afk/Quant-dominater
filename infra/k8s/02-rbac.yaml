# In the cloud the sandbox boundary is a Pod, not Docker. The orchestrator /
# sandbox-runner gets a tightly-scoped ServiceAccount allowed to manage
# contestant pods ONLY in the iicpc-sandbox namespace — never cluster-wide.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sandbox-orchestrator
  namespace: iicpc
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: sandbox-manager
  namespace: iicpc-sandbox
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "pods/status"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sandbox-orchestrator-binding
  namespace: iicpc-sandbox
subjects:
  - kind: ServiceAccount
    name: sandbox-orchestrator
    namespace: iicpc
roleRef:
  kind: Role
  name: sandbox-manager
  apiGroup: rbac.authorization.k8s.io
