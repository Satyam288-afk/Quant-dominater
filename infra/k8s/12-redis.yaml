# Redis = live leaderboard state (leaderboard:global ZSET, team scorecards,
# per-run live metrics). Ephemeral by design — rebuilt from TimescaleDB if lost.
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: iicpc
  labels: { app: redis }
spec:
  selector: { app: redis }
  ports:
    - { name: redis, port: 6379, targetPort: 6379 }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: iicpc
spec:
  replicas: 1
  selector: { matchLabels: { app: redis } }
  template:
    metadata:
      labels: { app: redis }
    spec:
      containers:
        - name: redis
          image: redis:7.4-alpine
          args: ["redis-server", "--save", "", "--appendonly", "no", "--maxmemory", "512mb", "--maxmemory-policy", "allkeys-lru"]
          ports:
            - { name: redis, containerPort: 6379 }
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits: { cpu: "1", memory: "768Mi" }
          readinessProbe:
            exec: { command: ["redis-cli", "ping"] }
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            exec: { command: ["redis-cli", "ping"] }
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
