# Experimental upload-driven orchestrator manifest, intentionally not included
# by the base kustomization. The current Go orchestrator executes bot-fleet and
# validator binaries locally; production Kubernetes orchestration needs a
# Kubernetes bot-fleet executor and durable artifact storage before this
# Deployment should be scaled above zero.
apiVersion: v1
kind: Service
metadata:
  name: orchestrator
  namespace: iicpc
  labels: { app: orchestrator }
spec:
  selector: { app: orchestrator }
  ports:
    - { name: http, port: 9300, targetPort: 9300 }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
  namespace: iicpc
spec:
  replicas: 0
  selector: { matchLabels: { app: orchestrator } }
  template:
    metadata:
      labels: { app: orchestrator }
    spec:
      serviceAccountName: sandbox-orchestrator
      containers:
        - name: orchestrator
          image: ghcr.io/iicpc/orchestrator:latest
          env:
            - { name: ORCHESTRATOR_ADDR, value: ":9300" }
            - { name: SANDBOX_RUNNER_URL, value: "http://sandbox-runner.iicpc.svc.cluster.local:9200" }
            - { name: SUBMISSION_API_URL, value: "http://submission-api.iicpc.svc.cluster.local:9100" }
            # The orchestrator both serves an auth-gated API and POSTs scores to
            # the leaderboard; it must present the SAME shared token the
            # leaderboard-api requires.
            - { name: REQUIRE_AUTH, value: "1" }
            - { name: SERVICE_AUTH_TOKEN, valueFrom: { secretKeyRef: { name: platform-auth, key: SERVICE_AUTH_TOKEN } } }
          ports:
            - { name: http, containerPort: 9300 }
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits: { cpu: "1", memory: "512Mi" }
          readinessProbe:
            httpGet: { path: /health, port: 9300 }
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /health, port: 9300 }
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
