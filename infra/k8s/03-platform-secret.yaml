# Shared service-to-service auth token. Every internal writer (orchestrator ->
# leaderboard-api, etc.) presents this token; the leaderboard-api refuses to
# start without it (REQUIRE_AUTH=1, fail-closed) so its score-write endpoint is
# never anonymously writable.
#
# PLACEHOLDER ONLY — DO NOT SHIP THIS VALUE. In a real deployment inject it from
# a secrets manager (AWS Secrets Manager / External Secrets Operator — see
# Terraform) or override here, e.g.:
#   kubectl -n iicpc create secret generic platform-auth \
#     --from-literal=SERVICE_AUTH_TOKEN="$(openssl rand -hex 32)" \
#     --dry-run=client -o yaml | kubectl apply -f -
apiVersion: v1
kind: Secret
metadata:
  name: platform-auth
  namespace: iicpc
type: Opaque
stringData:
  # Override before any shared/demo/prod deploy. A blank token would make the
  # fail-closed pods (REQUIRE_AUTH=1) refuse to start, which is the safe default.
  SERVICE_AUTH_TOKEN: "CHANGE-ME-placeholder-service-auth-token"
