# Distributed load generator. A benchmark run is a batch, so the bot fleet is a
# Job whose pods fan out across nodes: parallelism × BOTS_PER_POD = total bots.
# Defaults below = 8 × 1250 = 10,000 concurrent bots. The orchestrator templates
# this per run, substituting the run id and the contestant sandbox endpoint.
#
# Scale horizontally by raising `parallelism`/`completions` (and node count);
# each pod is independent and publishes telemetry to Redpanda.
apiVersion: batch/v1
kind: Job
metadata:
  name: bot-fleet-run # orchestrator appends the run id, e.g. bot-fleet-run-<id>
  namespace: iicpc
spec:
  parallelism: 8
  completions: 8
  backoffLimit: 0
  completionMode: Indexed # each pod gets JOB_COMPLETION_INDEX for a disjoint bot id range
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels: { app: bot-fleet }
    spec:
      restartPolicy: Never
      containers:
        - name: bot-fleet
          image: ghcr.io/iicpc/bot-fleet:latest # built with --features kafka
          command: ["/bin/sh", "-c"]
          args:
            - |
              exec bot-fleet \
                --target "$BOT_TARGET" \
                --run-id "$RUN_ID" \
                --bots "$BOTS_PER_POD" \
                --orders-per-sec "$ORDERS_PER_SEC" \
                --duration-sec "$DURATION_SEC" \
                --ws-connections 64 \
                --pod-index "${JOB_COMPLETION_INDEX:-0}" \
                --seed 42 \
                --symbols "$SYMBOLS" \
                --price-levels "$PRICE_LEVELS" \
                --qty-max "$QTY_MAX" \
                --market-per-mille "$MARKET_PER_MILLE" \
                --cancel-per-mille "$CANCEL_PER_MILLE" \
                --backend live \
                --kafka-brokers "$KAFKA_BROKERS" \
                --kafka-topic "$KAFKA_TELEMETRY_TOPIC" \
                --events-out /tmp/events.jsonl \
                --outputs-out /tmp/outputs.jsonl
          env:
            # Each pod offsets its global bot-id range by pod_index * bots, so
            # IDs are unique fleet-wide (1250 × 8 = 10,000 distinct bots) and
            # fills route to the right pod — see --pod-index in bot-fleet.
            - { name: BOT_TARGET, value: "ws://ENGINE_PLACEHOLDER.iicpc-sandbox.svc.cluster.local:8080/ws" }
            - { name: RUN_ID, value: "run_demo" }
            - { name: BOTS_PER_POD, value: "1250" }
            - { name: ORDERS_PER_SEC, value: "20" }
            - { name: DURATION_SEC, value: "60" }
            - { name: SYMBOLS, value: "256" }
            - { name: PRICE_LEVELS, value: "9" }
            - { name: QTY_MAX, value: "50" }
            - { name: MARKET_PER_MILLE, value: "100" }
            - { name: CANCEL_PER_MILLE, value: "100" }
            - { name: KAFKA_BROKERS,         valueFrom: { configMapKeyRef: { name: platform-config, key: KAFKA_BROKERS } } }
            - { name: KAFKA_TELEMETRY_TOPIC, valueFrom: { configMapKeyRef: { name: platform-config, key: KAFKA_TELEMETRY_TOPIC } } }
          resources:
            requests: { cpu: "500m", memory: "256Mi" }
            limits: { cpu: "2", memory: "1Gi" }
